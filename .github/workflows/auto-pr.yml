name: Auto PR to main

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "${{ github.ref_name }}" --base main --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head "${{ github.ref_name }}" \
              --fill
            echo "PR created."
          else
            echo "PR #$EXISTING already exists — skipping."
          fi
